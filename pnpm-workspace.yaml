packages:
  - theme
  - theme_old
  - addons/*
  - presentations/*

# local-pkg@1.1.2 uses import.meta.resolve to detect optional peers.
# In pnpm strict mode on Node 22, that throws before try/catch can catch it.
# Granting @vue/compiler-sfc to local-pkg's scope silences the error.
packageExtensions:
  local-pkg@*:
    dependencies:
      '@vue/compiler-sfc': '*'

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - playwright-chromium
