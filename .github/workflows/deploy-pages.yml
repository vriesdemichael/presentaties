name: Deploy pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 10.32.1

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Diagnose environment
      continue-on-error: true
      run: |
        echo "::notice::Node $(node --version) | pnpm $(pnpm --version)"
        SLIDEV_OUT=$(pnpm --dir presentations/sprint-review-product-104-temporal exec slidev --version 2>&1)
        SLIDEV_EXIT=$?
        if [ $SLIDEV_EXIT -eq 0 ]; then
          echo "::notice::Slidev OK: $SLIDEV_OUT"
        else
          echo "::warning::Slidev check failed (exit $SLIDEV_EXIT): ${SLIDEV_OUT//$'\n'/ | }"
        fi

    - name: Build presentations
      run: pnpm run build:pages -- --base /${{ github.event.repository.name }}/

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - uses: actions/upload-pages-artifact@v3
      with:
        path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
